name: Deploy slides to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/public-launch-slides.md'
      - 'docs/README.md'
      - '.github/workflows/deploy-slides.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build Marp slides
        run: |
          npx --yes @marp-team/marp-cli@4.1.0 \
            docs/public-launch-slides.md \
            -o dist/index.html \
            --html \
            --allow-local-files

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
